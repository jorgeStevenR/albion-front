<div class="auth-page">
  <div class="auth-bg"></div>
  <mat-card class="auth-card">
    <div class="auth-header">
      <mat-icon>groups</mat-icon>
      <h1>Acceso al gremio</h1>
      @if (guildName) {
        <p class="guild-badge">{{ guildName }}</p>
      }
      <p class="info-text">
        No hace falta registrarse manualmente. Cuando entras al gremio en Albion,
        tu cuenta se crea sola en la app.
      </p>
    </div>

    <a mat-flat-button color="primary" class="submit-btn" routerLink="/auth/login">
      Ir al login
    </a>

    <p class="auth-footer">
      Usa tu <strong>nombre exacto de Albion</strong>. Si eres nuevo, pide la contraseña
      a un admin o caller del gremio.
    </p>
  </mat-card>
</div>
