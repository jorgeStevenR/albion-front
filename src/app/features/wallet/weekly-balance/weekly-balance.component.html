<app-page-header title="Balance Semanal" subtitle="Reporte de ganancias y gastos por semana"></app-page-header>

@if (loading) {
  <app-loading-spinner message="Generando reporte..." />
} @else if (weeks.every(w => w.earnings === 0 && w.expenses === 0)) {
  <app-empty-state
    icon="calendar_month"
    title="Sin movimientos esta semana"
    description="El gremio tiene 0 de balance. Participa en Avalonianas para generar ganancias."
  />
} @else {
  <mat-card class="table-card">
    <table mat-table [dataSource]="weeks">
      <ng-container matColumnDef="week">
        <th mat-header-cell *matHeaderCellDef>Semana</th>
        <td mat-cell *matCellDef="let row">{{ row.week }}</td>
      </ng-container>
      <ng-container matColumnDef="earnings">
        <th mat-header-cell *matHeaderCellDef>Ganancias</th>
        <td mat-cell *matCellDef="let row" class="positive">+{{ row.earnings | currencySilver }}</td>
      </ng-container>
      <ng-container matColumnDef="expenses">
        <th mat-header-cell *matHeaderCellDef>Gastos</th>
        <td mat-cell *matCellDef="let row" class="negative">-{{ row.expenses | currencySilver }}</td>
      </ng-container>
      <ng-container matColumnDef="finalBalance">
        <th mat-header-cell *matHeaderCellDef>Balance</th>
        <td mat-cell *matCellDef="let row"><strong>{{ row.finalBalance | currencySilver }}</strong></td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
}
