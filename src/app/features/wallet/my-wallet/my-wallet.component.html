<app-page-header
  title="Mi Balance"
  [subtitle]="'Cuenta personal de ' + playerName"
></app-page-header>

@if (loading) {
  <app-loading-spinner message="Cargando tu balance..." />
} @else {
  <div class="stats-grid">
    <app-stat-card icon="account_balance_wallet" label="Balance actual" [value]="balance" [isCurrency]="true" accent="gold" />
    <app-stat-card icon="savings" label="Ganado total" [value]="totalEarned" [isCurrency]="true" accent="green" />
    <app-stat-card icon="shopping_cart" label="Gastado total" [value]="totalSpent" [isCurrency]="true" accent="blue" />
  </div>
  <mat-card class="info-card">
    <p>
      Tu balance personal se actualiza cuando se reparten recompensas de avalonianas o realizas compras en el gremio.
    </p>
  </mat-card>
}
