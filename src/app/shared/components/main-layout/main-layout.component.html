<mat-sidenav-container class="layout-container">
  <mat-sidenav
    #sidenav
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="!(isHandset$ | async)"
    class="sidebar"
  >
    <div class="sidebar-brand">
      <mat-icon>castle</mat-icon>
      <div>
        <strong>Albion Treasury</strong>
        <small>Guild Balance</small>
      </div>
    </div>

    <mat-nav-list>
      @for (item of visibleNavItems(); track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: isExactRoute(item) }"
          (click)="closeSidenavIfMobile(sidenav)"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      @if (isHandset$ | async) {
        <button mat-icon-button (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }

      <span class="spacer"></span>

      <div class="user-info">
        <mat-icon>person</mat-icon>
        <div class="user-details">
          <span class="username">{{ user?.albionName }}</span>
          <span class="role">{{ getRoleLabel() }}</span>
        </div>
      </div>

      <button mat-icon-button [matMenuTriggerFor]="userMenu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/profile">
          <mat-icon>person</mat-icon>
          Mi perfil
        </button>
        @if (canViewGuildBalance()) {
          <button mat-menu-item routerLink="/guild/balance">
            <mat-icon>account_balance</mat-icon>
            Balance Gremial
          </button>
        } @else {
          <button mat-menu-item routerLink="/wallet">
            <mat-icon>account_balance_wallet</mat-icon>
            Mi Balance
          </button>
        }
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          Cerrar sesión
        </button>
      </mat-menu>
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
